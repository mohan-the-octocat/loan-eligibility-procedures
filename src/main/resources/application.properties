# Database connection properties
spring.datasource.url=jdbc:mysql://localhost:3306/loan_eligibility
spring.datasource.username=root
spring.datasource.password=password

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect
spring.jpa.properties.hibernate.format_sql=true

# Entity scanning
spring.jpa.properties.hibernate.ejb.entitymanager_factory_name=loanEligibilityEntityManagerFactory
spring.jpa.properties.hibernate.ejb.entitymanager_factory_class=org.hibernate.jpa.HibernateEntityManagerFactory
